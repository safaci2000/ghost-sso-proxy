version: 2

# ── Project ───────────────────────────────────────────────────────────────────
project_name: ghost-sso-proxy

before:
  hooks:
    - go mod tidy
    - go mod verify

# ── Build ─────────────────────────────────────────────────────────────────────
builds:
  - id: ghost-sso-proxy
    main: ./cmd
    binary: ghost-sso-proxy
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    # Embed version info at link time (same as Magefile).
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"

# ── Archives ──────────────────────────────────────────────────────────────────
archives:
  - ids:
      - ghost-sso-proxy
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    # Windows users get a zip if we ever add windows builds.
    format_overrides:
      - goos: windows
        formats: [ 'zip' ]
    files:
      - README.md
      - LICENSE*
      - docs/**

# ── Checksums ─────────────────────────────────────────────────────────────────
checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256

# ── Docker ────────────────────────────────────────────────────────────────────
dockers_v2:
  - id: ghost-sso-proxy
    images:
      - "ghcr.io/safaci2000/ghost-sso-proxy"
    dockerfile: "docker/Dockerfile.release"
    platforms:
      - linux/amd64
      - linux/arm64
    tags:
      - "{{ .Version }}"
      - "{{ .RawVersion }}"
      - "{{ if not .IsNightly }}latest{{ end }}"
    labels:
      "org.opencontainers.image.description": "Ghost SSO Proxy"
      "org.opencontainers.image.created": "{{.Date}}"
      "org.opencontainers.image.name": "{{.ProjectName}}"
      "org.opencontainers.image.revision": "{{.FullCommit}}"
      "org.opencontainers.image.version": "{{.Version}}"
      "org.opencontainers.image.source": "{{.GitURL}}"



# ── GitHub Release ────────────────────────────────────────────────────────────
release:
  github:
    owner: "safaci2000"
    name: ghost-sso-proxy
  draft: false
  prerelease: auto
  name_template: "{{ .ProjectName }} {{ .Tag }}"
  header: |
    ## ghost-sso-proxy {{ .Tag }}

    Envoy ExtProc shim that bridges OIDC → Ghost admin sessions.

    ### Docker

    ```bash
    docker pull ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/ghost-sso-proxy:{{ .Version }}
    ```
  footer: |
    **Full Changelog**: https://github.com/{{ .Env.GITHUB_REPOSITORY_OWNER }}/ghost-sso-proxy/compare/{{ .PreviousTag }}...{{ .Tag }}

# ── Changelog ─────────────────────────────────────────────────────────────────
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - Merge pull request
      - Merge branch
  groups:
    - title: "Breaking Changes"
      regexp: "^.*!:.*$"
      order: 0
    - title: Features
      regexp: "^.*feat.*:.*$"
      order: 1
    - title: Bug Fixes
      regexp: "^.*fix.*:.*$"
      order: 2
    - title: Performance
      regexp: "^.*perf.*:.*$"
      order: 3
    - title: Other
      order: 999

